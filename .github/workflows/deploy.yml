name: Deploy

# Deployment model:
#   • API (service "sprout") is connected to this GitHub repo in Railway, so
#     Railway auto-builds + redeploys it on every push to main — no step needed
#     here for the API.
#   • The jobs worker (service "worker") is deployed from CI with the Railway
#     CLI, because it shares the API image (START_FILE=src/worker.ts) rather than
#     having its own repo connection.
#
# Setup: create a Railway *project* token (Project → Settings → Tokens) and add
# it as the GitHub Actions secret RAILWAY_TOKEN. Without it, the worker step
# skips and the API still auto-deploys natively.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy-worker:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: npm i -g @railway/cli
      - name: Deploy worker
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: railway up --service worker --detach
      - name: Skip notice
        if: ${{ env.RAILWAY_TOKEN == '' }}
        run: echo "RAILWAY_TOKEN not set — skipping worker deploy (API auto-deploys via Railway's GitHub integration)."
