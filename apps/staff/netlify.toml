# Netlify config for the STAFF web app (Vite SPA). This lives in apps/staff so it
# is the package Netlify deploys: set the site's "Base directory" to apps/staff
# (Site configuration → Build & deploy → Build settings). Netlify then reads THIS
# file, runs the build from here, and resolves `publish` relative to apps/staff —
# so output lands at apps/staff/dist with no path prefixing.
#
# The VITE_* values are PUBLIC (publishable key + URLs ship in the client bundle),
# so baking them in keeps the deploy zero-config. NEVER put the Supabase secret
# key or DATABASE_URL here — those are server-only, on the Railway API service.

[build]
  # pnpm resolves the workspace root from here, so the filter build works.
  command = "pnpm --filter @sprout/staff build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_SUPABASE_URL = "https://udmnrzemfcbtiejdqyut.supabase.co"
  VITE_SUPABASE_ANON_KEY = "sb_publishable_vZFs5XUjFpv9GUgGtNPDZA_g9ogy4KQ"
  VITE_API_URL = "https://sprout-production-8da1.up.railway.app"

# SPA fallback: TanStack Router does client-side routing, so every path must
# serve index.html (otherwise deep links / refreshes 404).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
