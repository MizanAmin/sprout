# Railway config shared by BOTH backend services (API + jobs worker).
# Lives at the repo root so the Docker build context is the whole pnpm workspace
# (the API Dockerfile copies packages/* + apps/api). Both services build the same
# image; the worker service just sets START_FILE=src/worker.ts (Dockerfile CMD) so
# it runs the jobs loop instead of the HTTP API. The worker also serves /health,
# so the healthcheck below works for it too. The staff static site is a separate
# Railway service (Vite build) configured in the dashboard.
[build]
builder = "dockerfile"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
# Uses the Dockerfile CMD (`bun run src/index.ts`). Railway injects all the
# environment variables from .env.example as service variables.
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
