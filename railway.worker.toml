# Railway config for the JOBS WORKER service (separate from the API).
# In the Railway dashboard, create a second service from the SAME repo and point
# its config path at this file (Settings → Config-as-code). It reuses the API
# Dockerfile/image and just overrides the start command to run the worker loop
# (invoice generation, reminders, trial warnings, backups). Give it the same
# environment variables as the API service (DATABASE_URL, SUPABASE_*, RESEND_*,
# STRIPE_*, etc.). No HTTP port / healthcheck — it's a long-running process.
[build]
builder = "dockerfile"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
startCommand = "bun run src/worker.ts"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
